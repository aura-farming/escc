# Escc Workflow Feature Development With Docs And Tests

## Action

Follow the feature-development-with-docs-and-tests workflow:
1. Implement new or updated logic in scripts/lib/ and scripts/escc.js.
2. Update or create related skills/*/SKILL.md files.
3. Update or add documentation in docs/DECISIONS.md and docs/releases/vX.Y.Z.md.
4. Add or update tests in tests/unit/ for new/changed logic.
5. Update CHANGELOG.md with a summary of the feature.
6. Update .env.example if new config is needed.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: scripts/escc.js, scripts/lib/*.js, skills/*/SKILL.md

