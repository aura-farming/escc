# Escc Workflow Feature Release Version Bump

## Action

Follow the feature-release-version-bump workflow:
1. Update package.json and package-lock.json with the new version.
2. Update .claude-plugin/plugin.json and .claude-plugin/marketplace.json with the new version.
3. Update CLAUDE.md with the new version line.
4. Update CHANGELOG.md with the release date and details.
5. Optionally update SOUL.md, AGENTS.md, agent.yaml, or other meta files.
6. Commit with chore(release): vX.Y.Z message.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: package.json, package-lock.json, .claude-plugin/plugin.json

