<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="ESCC">
  <title>ESCC</title>
  <defs>
    <linearGradient id="escc-badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#0f2f8f"/>
    </linearGradient>
  </defs>
  <!-- Rounded-square badge -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#escc-badge)"/>
  <rect x="4.75" y="4.75" width="54.5" height="54.5" rx="13.25" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>
  <!-- Upward sales-trend line with rising data points -->
  <polyline points="15,44 27,33 36,39 49,21"
    fill="none" stroke="#7dd3fc" stroke-width="4"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrowhead at the high point -->
  <path d="M40 21 L49 21 L49 30" fill="none" stroke="#7dd3fc"
    stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Data point nodes -->
  <circle cx="15" cy="44" r="3" fill="#ffffff"/>
  <circle cx="27" cy="33" r="3" fill="#ffffff"/>
  <circle cx="36" cy="39" r="3" fill="#ffffff"/>
</svg>
