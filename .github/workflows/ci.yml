name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [18, 20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # Lockfile is committed — use `npm ci` for reproducible installs.
      - name: Install dependencies
        run: npm ci

      # `npm test` runs the full quality plane: the scripts/ci/ validators,
      # the catalog + command-registry pins, and the hermetic test suite
      # (unit + content guards).
      - name: Run tests
        run: npm test
