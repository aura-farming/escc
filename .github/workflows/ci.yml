name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [18, 20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # Lockfile is committed — use `npm ci` for reproducible installs.
      - name: Install dependencies
        run: npm ci

      # `npm test` wires in the scripts/ci/ validators in Phase 6 (quality plane);
      # until then CI runs the hermetic test suite, which is the canonical green metric.
      - name: Run tests
        run: node tests/run-all.js
